<a
  [href]="'#/category/' + category().slug"
  class="group relative block aspect-[4/5] w-full overflow-hidden rounded-2xl"
  [attr.aria-label]="'Browse ' + category().name"
>
  <img
    [src]="category().imageUrl"
    [alt]="category().name"
    loading="lazy"
    class="absolute inset-0 h-full w-full object-cover transition duration-500 group-hover:scale-110"
  />
  <div
    class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/30 to-transparent transition group-hover:from-blue-900/80"
  ></div>
  <div class="absolute inset-0 flex items-end justify-center p-4 md:p-6">
    <h3
      class="text-center text-lg font-semibold tracking-wide text-white drop-shadow md:text-2xl"
    >
      {{ category().name }}
    </h3>
  </div>
</a>
