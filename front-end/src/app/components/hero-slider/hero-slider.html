<section
  class="relative h-[420px] w-full overflow-hidden bg-gray-900 md:h-[560px]"
  (mouseenter)="pause()"
  (mouseleave)="resume()"
  aria-roledescription="carousel"
  aria-label="Featured electronics"
>
  @for (slide of slides; track slide.id; let i = $index) {
    <div
      class="absolute inset-0 transition-opacity duration-700 ease-in-out"
      [class]="i === currentIndex() ? 'opacity-100' : 'opacity-0 pointer-events-none'"
      [attr.aria-hidden]="i !== currentIndex()"
    >
      <img
        [src]="slide.image"
        [alt]="slide.title"
        class="h-full w-full object-cover"
      />
      <div
        class="absolute inset-0 bg-gradient-to-r from-black/60 via-black/30 to-transparent"
      ></div>

      <div class="absolute inset-0 flex items-center">
        <div class="mx-auto w-full max-w-7xl px-6 md:px-10">
          <div class="max-w-xl text-white">
            <span
              class="inline-block rounded-full bg-blue-500/90 px-3 py-1 text-xs font-medium uppercase tracking-widest"
            >
              {{ slide.kicker }}
            </span>
            <h2 class="mt-4 text-3xl font-bold leading-tight md:text-5xl">
              {{ slide.title }}
            </h2>
            <p class="mt-3 hidden text-base text-white/80 md:block md:text-lg">
              {{ slide.subtitle }}
            </p>
            <button
              type="button"
              class="mt-6 rounded-full bg-white px-5 py-2.5 text-sm font-semibold text-blue-900 transition hover:bg-blue-50 md:px-6 md:py-3 md:text-base"
            >
              Shop now
            </button>
          </div>
        </div>
      </div>
    </div>
  }

  <!-- Prev / Next -->
  <button
    type="button"
    (click)="prev()"
    aria-label="Previous slide"
    class="absolute left-3 top-1/2 -translate-y-1/2 rounded-full bg-white/80 p-2 text-blue-900 backdrop-blur transition hover:bg-white md:left-6 md:p-3"
  >
    <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
  </button>
  <button
    type="button"
    (click)="next()"
    aria-label="Next slide"
    class="absolute right-3 top-1/2 -translate-y-1/2 rounded-full bg-white/80 p-2 text-blue-900 backdrop-blur transition hover:bg-white md:right-6 md:p-3"
  >
    <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M9 6l6 6-6 6" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
  </button>

  <!-- Dots -->
  <div
    class="absolute bottom-5 left-1/2 flex -translate-x-1/2 items-center gap-2"
    role="tablist"
  >
    @for (slide of slides; track slide.id; let i = $index) {
      <button
        type="button"
        role="tab"
        [attr.aria-label]="'Go to slide ' + (i + 1)"
        [attr.aria-selected]="i === currentIndex()"
        (click)="goTo(i)"
        class="h-2 rounded-full transition-all"
        [class]="
          i === currentIndex()
            ? 'w-8 bg-white'
            : 'w-2 bg-white/50 hover:bg-white/80'
        "
      ></button>
    }
  </div>
</section>
