<div class="flex w-full justify-between items-center p-2 bg-blue-900 text-white">

  <!-- LEFT: Location -->
  <div class="flex items-center gap-2 cursor-pointer">
    
    <!-- GPS Icon -->
    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none">
      <path d="M12 2C8 2 5 5 5 9c0 5 7 13 7 13s7-8 7-13c0-4-3-7-7-7z" fill="#f24936"/>
      <circle cx="12" cy="9" r="2.5" fill="#c0392b"/>
    </svg>

    <!-- City -->
    <span class="text-lg font-medium">Casablanca</span>

    <!-- Dropdown Arrow -->
    <svg class="w-4 h-4 mt-1" viewBox="0 0 24 24" fill="none">
      <path d="M6 9l6 6 6-6" stroke="white" stroke-width="2" stroke-linecap="round"/>
    </svg>

  </div>

  <!-- RIGHT -->
  <div class="flex gap-6 items-center">

    <!-- Phone -->
    <div class="flex items-center gap-2">
      <svg class="w-5" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
        <path d="M3 5.5C3 14 10 21 18.5 21"/>
      </svg>
      <span class="text-sm">phone : <span>+212 657-377886</span></span>
    </div>

    <!-- Links -->
    <div class="flex gap-6">
      <a href="#" class="text-sm">liked Products</a>
      <a href="#" class="text-sm">help and contact</a>
    </div>

  </div>
</div>

<!-- nav -->

<div class="flex w-full justify-between items-center p-4 bg-[#FAFDFF] text-black">

  <!-- LEFT -->
  <div class="flex items-center gap-4">
    <img class="w-20" src="../../../assets/logo.png" alt="logo">
    <a href="#" class="font-medium hover:text-blue-500 transition">
      all categories
    </a>
  </div>

  <!-- SEARCH -->
  <div class="flex items-center w-1/2 relative">
    <input 
      type="text" 
      placeholder="search..." 
      class="w-full border border-gray-300 rounded-full py-2 px-4 pr-12 focus:outline-none focus:ring-2 focus:ring-blue-500"
    >
    
    <!-- Search Button inside input -->
    <button class="absolute right-1 bg-blue-500 p-2 rounded-full hover:bg-blue-600 transition">
      <svg class="w-5" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
        <path d="M15 15L21 21"/>
        <path d="M17 10C17 13.866 13.866 17 10 17C6.134 17 3 13.866 3 10C3 6.134 6.134 3 10 3C13.866 3 17 6.134 17 10Z"/>
      </svg>
    </button>
  </div>

  <!-- RIGHT -->
  <div class="flex gap-4 items-center">

    <!-- Profile -->
    <img class="w-10 h-10 rounded-full object-cover" src="../../../assets/profile.png" alt="profile">

    <!-- Notifications -->
    <button class="w-10 h-10 rounded-full bg-white outline outline-gray-300 flex items-center justify-center hover:bg-gray-100 transition">
      <svg class="w-5" viewBox="0 0 24 24" fill="#ffdd00">
        <path d="M12 1.25a1.75 1.75 0 0 0-1.737 1.967A7.003 7.003 0 0 0 5 10v7H4a1 1 0 1 0 0 2h16a1 1 0 1 0 0-2h-1v-7a7.003 7.003 0 0 0-5.263-6.783A1.75 1.75 0 0 0 12 1.25Z"/>
      </svg>
    </button>

    <!-- Cart -->
    <button class="w-10 h-10 rounded-full bg-white outline outline-gray-300 flex items-center justify-center hover:bg-gray-100 transition">
      <svg class="w-5" viewBox="0 0 1000 1000" fill="#0062ff">
        <path d="M891 308H340..."></path>
      </svg>
    </button>

  </div>

</div>
