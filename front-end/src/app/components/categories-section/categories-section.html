<section class="bg-white py-12 md:py-20">
  <div class="mx-auto max-w-7xl px-6 md:px-10">
    <div class="mb-8 flex items-end justify-between gap-4 md:mb-12">
      <div>
        <p class="text-sm font-medium uppercase tracking-widest text-blue-500">
          Shop by category
        </p>
        <h2 class="mt-1 text-2xl font-bold text-gray-900 md:text-4xl">
          Find what you love
        </h2>
      </div>
      <a
        href="#"
        class="hidden text-sm font-medium text-blue-600 hover:text-blue-700 md:inline"
      >
        View all categories &rarr;
      </a>
    </div>

    <div class="grid grid-cols-2 gap-4 md:grid-cols-4 md:gap-6">
      @for (category of categories; track category.id) {
        <app-category-card [category]="category" />
      }
    </div>
  </div>
</section>
