<section class="bg-blue-50/60 py-12 md:py-20">
  <div class="mx-auto max-w-7xl px-6 md:px-10">
    <div class="mb-10 text-center md:mb-14">
      <p class="text-sm font-medium uppercase tracking-widest text-blue-500">
        Why choose us
      </p>
      <h2 class="mt-1 text-2xl font-bold text-gray-900 md:text-4xl">
        Built for the way you shop
      </h2>
    </div>

    <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 md:gap-6 lg:grid-cols-4">
      @for (benefit of benefits; track benefit.id) {
        <div
          class="flex flex-col items-start gap-3 rounded-2xl bg-white p-6 ring-1 ring-blue-100 transition hover:-translate-y-1 hover:ring-blue-300 hover:shadow-md"
        >
          <div
            class="flex h-12 w-12 items-center justify-center rounded-xl bg-blue-100 text-2xl"
            aria-hidden="true"
          >
            {{ benefit.emoji }}
          </div>
          <h3 class="text-lg font-semibold text-gray-900">
            {{ benefit.title }}
          </h3>
          <p class="text-sm leading-relaxed text-gray-600">
            {{ benefit.description }}
          </p>
        </div>
      }
    </div>
  </div>
</section>
