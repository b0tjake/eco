<article
  class="group flex flex-col overflow-hidden rounded-2xl bg-white ring-1 ring-gray-200 transition hover:ring-blue-500 hover:shadow-lg"
>
  <div class="relative aspect-square overflow-hidden bg-gray-50">
    <img
      [src]="product().imageUrl"
      [alt]="product().name"
      (error)="onImageError($event)"
      loading="lazy"
      class="h-full w-full object-cover transition duration-300 group-hover:scale-105"
    />
  </div>

  <div class="flex flex-1 flex-col gap-2 p-4">
    <h3 class="line-clamp-1 text-sm font-semibold text-gray-900 md:text-base">
      {{ product().name }}
    </h3>
    <p class="line-clamp-2 text-xs text-gray-500">
      {{ product().description }}
    </p>

    <div class="mt-auto flex items-center justify-between gap-2 pt-3">
      <span class="text-base font-bold text-blue-900 md:text-lg">
        {{ formatPrice(product().price) }}
      </span>
      <button
        type="button"
        class="rounded-full bg-blue-500 px-3 py-1.5 text-xs font-medium text-white transition hover:bg-blue-600 active:scale-95"
        aria-label="Add to cart"
      >
        Add to cart
      </button>
    </div>
  </div>
</article>
